<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Messages</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="load()" [disabled]="loading">
        <ion-icon slot="icon-only" name="refresh-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="load($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div *ngIf="!loading && friends.length === 0" class="empty ion-padding">
    <ion-icon name="chatbubbles-outline"></ion-icon>
    <h2>No conversations yet</h2>
    <p>Add people from the <strong>Connect</strong> tab. Messaging only works with accepted connections.</p>
  </div>

  <ion-list *ngIf="friends.length > 0">
    <ion-item button *ngFor="let f of friends" (click)="openThread(f)">
      <ion-avatar slot="start" aria-hidden="true">
        <span>{{ f.displayName.charAt(0).toUpperCase() }}</span>
      </ion-avatar>
      <ion-label>
        <h2>{{ f.displayName }}</h2>
        <p>Open chat</p>
      </ion-label>
      <ion-icon name="chevron-forward-outline" slot="end" color="medium"></ion-icon>
    </ion-item>
  </ion-list>
</ion-content>
