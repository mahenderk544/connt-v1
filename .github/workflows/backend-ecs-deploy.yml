# =============================================================================
# GitHub Actions: build Docker in the cloud → ECR → ECS (no Docker on your PC)
#
# Flow:  git push (main, backend/** changed)  →  build image  →  push ECR  →  ECS deploy
#
# ── One-time: create the ECS task definition (fixes "Unable to describe task definition")
#    The workflow clones your *latest registered* task definition and only swaps the image.
#    So family must exist once before CI can update it.
#
#    Option A — AWS Console
#      ECS → Task definitions → Create → Fargate → add container (port 8080), image can be
#      any valid ECR URI (e.g. first push from this workflow after a manual ECR-only step, or
#      a placeholder). Set execution role, CloudWatch logs, env:
#        SPRING_PROFILES_ACTIVE=prod
#        SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME
#        Secrets: SPRING_DATASOURCE_PASSWORD, CONNTO_JWT_SECRET (Secrets Manager ARNs)
#      Family name → use that exact string as GitHub variable ECS_TASK_DEFINITION.
#
#    Option B — AWS CLI (copy infra/ecs/fargate-task-definition.template.json, replace
#      YOUR_* placeholders, save as fargate-task-definition.json — do NOT commit secrets)
#      aws ecs register-task-definition --cli-input-json file://fargate-task-definition.json \
#        --region YOUR_REGION
#
#    Then: ECS → Clusters → create cluster → create service (Fargate, your subnets/SG, task def).
#
# ── GitHub: Settings → Secrets and variables → Actions
#
#    Auth (pick ONE):
#
#    A) OIDC (recommended — no long-lived AWS keys on GitHub)
#       Repository variable:  AWS_USE_OIDC = true
#       Repository secret:    AWS_ROLE_TO_ASSUME = arn:aws:iam::ACCOUNT:role/github-actions-ecs-deploy
#       IAM role trust policy: provider token.actions.githubusercontent.com, audience sts.amazonaws.com,
#       subject repo:OWNER/REPO:ref:refs/heads/main (adjust for forks if needed).
#       Role permissions (minimal): ecr:GetAuthorizationToken; ecr:* on repo resource;
#       ecs:DescribeTaskDefinition, ecs:RegisterTaskDefinition, ecs:UpdateService, ecs:DescribeServices;
#       iam:PassRole on your ecsTaskExecutionRole (and task role if any).
#
#    B) Access keys (works everywhere)
#       Leave AWS_USE_OIDC unset or not "true".
#       Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#
#    Repository variables (required for deploy):
#      AWS_REGION             e.g. ap-south-1  (optional; defaults to ap-south-1)
#      ECR_REPOSITORY         e.g. connto-backend  (create empty repo in ECR first, or workflow user needs ecr:CreateRepository)
#      ECS_CLUSTER            cluster name
#      ECS_SERVICE            service name
#      ECS_TASK_DEFINITION    task definition FAMILY name (must already exist — see above)
#
# Manual run: Actions → "Backend — ECR & ECS deploy" → Run workflow
# =============================================================================

name: Backend — ECR & ECS deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ecs-deploy.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fails fast with readable errors (common reason for a red X on the commit)
      - name: Check required GitHub variables
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}
        run: |
          ok=true
          for var in ECR_REPOSITORY ECS_CLUSTER ECS_SERVICE ECS_TASK_DEFINITION; do
            v=$(printenv "$var" 2>/dev/null || true)
            if [ -z "$v" ]; then
              echo "::error::Missing repository variable: $var — GitHub → Settings → Secrets and variables → Actions → Variables"
              ok=false
            fi
          done
          if [ "$ok" != true ]; then
            echo ""
            echo "Create these Variables (names must match exactly), then re-run the workflow."
            exit 1
          fi
          echo "Required variables are set."

      - name: Auth mode (read this if AWS login fails)
        run: |
          if [ "${{ vars.AWS_USE_OIDC }}" = "true" ]; then
            echo "Mode: OIDC — secret AWS_ROLE_TO_ASSUME must be set; IAM trust must allow repo ${{ github.repository }}"
          else
            echo "Mode: access keys — secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be set under Repository secrets"
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_USE_OIDC == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys)
        if: ${{ vars.AWS_USE_OIDC != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        working-directory: backend
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          set -euo pipefail
          test -n "${REGISTRY}"
          test -n "${REPOSITORY}"
          IMAGE_URI="${REGISTRY}/${REPOSITORY}:${GITHUB_SHA}"
          docker build -t "${IMAGE_URI}" -t "${REGISTRY}/${REPOSITORY}:latest" .
          docker push "${IMAGE_URI}"
          docker push "${REGISTRY}/${REPOSITORY}:latest"
          echo "image=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Register task definition and update ECS service
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER }}
          SERVICE: ${{ vars.ECS_SERVICE }}
          FAMILY: ${{ vars.ECS_TASK_DEFINITION }}
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          set -euo pipefail
          test -n "${CLUSTER}" || { echo "::error::Set GitHub variable ECS_CLUSTER"; exit 1; }
          test -n "${SERVICE}" || { echo "::error::Set GitHub variable ECS_SERVICE"; exit 1; }
          test -n "${FAMILY}" || { echo "::error::Set GitHub variable ECS_TASK_DEFINITION (family name)"; exit 1; }
          test -n "${IMAGE}" || { echo "::error::Build did not produce image output"; exit 1; }

          if ! aws ecs describe-task-definition \
            --task-definition "${FAMILY}" \
            --region "${AWS_REGION}" \
            --query taskDefinition \
            --output json > td.json 2>ecs-describe.err; then
            {
              echo "## Task definition not found: \`${FAMILY}\`"
              echo ""
              echo "The workflow needs an **existing** ECS task definition family to clone (image is replaced each run)."
              echo ""
              echo "### One-time fix"
              echo "1. **Console:** ECS → Task definitions → Create (Fargate, container port **8080**, image from your ECR)."
              echo "2. **CLI:** Fill \`infra/ecs/fargate-task-definition.template.json\` → \`aws ecs register-task-definition --cli-input-json file://...\`"
              echo "3. Set GitHub variable **ECS_TASK_DEFINITION** to that family name (e.g. \`connto-backend\`)."
              echo "4. Re-run this workflow (Actions → run workflow manually)."
              echo ""
              echo "### AWS error"
              echo '```'
              cat ecs-describe.err
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            cat ecs-describe.err >&2
            exit 1
          fi

          jq --arg img "${IMAGE}" \
            'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy,
              .deregisteredAt,
              .deregisteredBy
            )
            | .containerDefinitions[0].image = $img' \
            td.json > new-td.json

          NEW_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://new-td.json \
            --region "${AWS_REGION}" \
            --query taskDefinition.taskDefinitionArn \
            --output text)"

          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${NEW_ARN}" \
            --force-new-deployment \
            --region "${AWS_REGION}"

          echo "Deployed ${IMAGE} as ${NEW_ARN}"
          {
            echo "## Deployed"
            echo "- **Image:** \`${IMAGE}\`"
            echo "- **Task definition:** \`${NEW_ARN}\`"
            echo "- **Cluster / service:** \`${CLUSTER}\` / \`${SERVICE}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
